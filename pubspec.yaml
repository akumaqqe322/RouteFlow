name: route_flow
description: A portfolio-grade Flutter mobile app for route building and discovery.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.5.0

  # Supabase
  supabase_flutter: ^2.6.0
  uuid: ^4.5.1

  # Map & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # Subscriptions
  purchases_flutter: ^7.0.0

  # Monitoring
  sentry_flutter: ^8.0.0

  # Models & Core
  equatable: ^2.0.5

  # Storage & Config
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.2
  
  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  generate: true
