name: route_flow
description: A portfolio-grade Flutter mobile app for route building and discovery.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.5.0

  # Supabase
  supabase_flutter: ^2.6.0

  # Models & Core
  equatable: ^2.0.5

  # Storage & Config
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  generate: true
